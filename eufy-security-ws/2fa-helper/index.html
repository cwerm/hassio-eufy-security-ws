<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eufy Security - Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo svg {
      width: 48px;
      height: 48px;
      fill: #1a73e8;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-bar.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-bar.connected {
      background: #d1fae5;
      color: #065f46;
    }

    .status-bar.disconnected {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-bar.idle {
      background: #e0e7ff;
      color: #3730a3;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-bar.pending .status-dot { background: #f59e0b; animation: pulse 1.5s infinite; }
    .status-bar.connected .status-dot { background: #10b981; }
    .status-bar.disconnected .status-dot { background: #ef4444; }
    .status-bar.idle .status-dot { background: #6366f1; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      text-align: center;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    input[type="text"]:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    input[type="text"]::placeholder {
      letter-spacing: 0.3rem;
      color: #d1d5db;
    }

    .captcha-input {
      font-size: 1.25rem;
      letter-spacing: 0.25rem;
    }

    button {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: #1a73e8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: #1557b0;
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
    }

    .feedback.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
    }

    .feedback.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .captcha-image {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .captcha-image img {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      max-width: 100%;
      background: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v5.7c0 4.83-3.4 9.36-7 10.5-3.6-1.14-7-5.67-7-10.5V6.3l7-3.12zM11 7v2h2V7h-2zm0 4v6h2v-6h-2z"/></svg>
    </div>
    <h1 id="title">Verification</h1>
    <p class="subtitle" id="subtitle">Waiting for authentication challenge from Eufy Security...</p>

    <div id="statusBar" class="status-bar disconnected">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <!-- 2FA Code Form -->
    <form id="tfaForm" class="hidden">
      <div class="input-group">
        <label for="tfaInput">Verification Code</label>
        <input type="text" id="tfaInput" maxlength="6" placeholder="000000" inputmode="numeric" pattern="\d*" autocomplete="one-time-code">
      </div>
      <button type="submit" id="tfaBtn">Verify Code</button>
    </form>

    <!-- Captcha Form -->
    <form id="captchaForm" class="hidden">
      <div class="captcha-image">
        <img id="captchaImg" src="" alt="Captcha image">
      </div>
      <div class="input-group">
        <label for="captchaInput">Enter the text shown above</label>
        <input type="text" id="captchaInput" class="captcha-input" maxlength="20" placeholder="captcha" autocomplete="off">
      </div>
      <button type="submit" id="captchaBtn">Submit Captcha</button>
    </form>

    <div id="feedback" class="feedback"></div>
  </div>

  <script>
    const tfaForm = document.getElementById('tfaForm');
    const captchaForm = document.getElementById('captchaForm');
    const tfaInput = document.getElementById('tfaInput');
    const captchaInput = document.getElementById('captchaInput');
    const captchaImg = document.getElementById('captchaImg');
    const tfaBtn = document.getElementById('tfaBtn');
    const captchaBtn = document.getElementById('captchaBtn');
    const feedback = document.getElementById('feedback');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');

    let currentMode = 'idle';

    tfaInput.addEventListener('input', () => {
      tfaInput.value = tfaInput.value.replace(/\D/g, '').slice(0, 6);
    });

    function setMode(mode, data) {
      currentMode = mode;
      tfaForm.classList.add('hidden');
      captchaForm.classList.add('hidden');
      feedback.className = 'feedback';
      feedback.style.display = 'none';

      if (mode === 'tfa') {
        title.textContent = '2FA Verification';
        subtitle.textContent = 'Enter the verification code sent to your email or phone to complete authentication.';
        tfaForm.classList.remove('hidden');
        tfaInput.focus();
      } else if (mode === 'captcha') {
        title.textContent = 'Captcha Verification';
        subtitle.textContent = 'Enter the text shown in the image below to verify you are human.';
        captchaForm.classList.remove('hidden');
        if (data?.captchaImage) {
          captchaImg.src = data.captchaImage;
        }
        captchaInput.focus();
      } else {
        title.textContent = 'Verification';
        subtitle.textContent = 'Waiting for authentication challenge from Eufy Security...';
      }
    }

    function updateStatus(data) {
      statusBar.className = 'status-bar';
      if (!data.wsConnected) {
        statusBar.classList.add('disconnected');
        statusText.textContent = 'Disconnected from eufy-security-ws';
        setMode('idle');
      } else if (data.captchaPending) {
        statusBar.classList.add('pending');
        statusText.textContent = 'Captcha verification required';
        if (currentMode !== 'captcha') {
          setMode('captcha', data);
        } else if (data.captchaImage && captchaImg.src !== data.captchaImage) {
          captchaImg.src = data.captchaImage;
        }
      } else if (data.tfaPending) {
        statusBar.classList.add('pending');
        statusText.textContent = 'Verification code required';
        if (currentMode !== 'tfa') {
          setMode('tfa');
        }
      } else {
        statusBar.classList.add('idle');
        statusText.textContent = 'Connected — no verification needed';
        if (currentMode !== 'idle') {
          setMode('idle');
        }
      }
    }

    async function pollStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        updateStatus(data);
      } catch {
        updateStatus({ wsConnected: false, tfaPending: false, captchaPending: false });
      }
    }

    pollStatus();
    setInterval(pollStatus, 3000);

    tfaForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = tfaInput.value.trim();
      if (!code || code.length < 4) {
        showFeedback('Please enter a valid 4-6 digit code.', 'error');
        return;
      }

      tfaBtn.disabled = true;
      tfaBtn.innerHTML = '<span class="spinner"></span>Verifying...';
      hideFeedback();

      try {
        const res = await fetch('/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();

        if (data.success) {
          showFeedback('Verification successful! Authentication complete.', 'success');
          tfaInput.value = '';
          pollStatus();
        } else {
          showFeedback(data.error || 'Verification failed. Please try again.', 'error');
        }
      } catch (err) {
        showFeedback('Network error. Please check your connection.', 'error');
      } finally {
        tfaBtn.disabled = false;
        tfaBtn.textContent = 'Verify Code';
      }
    });

    captchaForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = captchaInput.value.trim();
      if (!code) {
        showFeedback('Please enter the captcha text.', 'error');
        return;
      }

      captchaBtn.disabled = true;
      captchaBtn.innerHTML = '<span class="spinner"></span>Submitting...';
      hideFeedback();

      try {
        const res = await fetch('/captcha', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();

        if (data.success) {
          showFeedback('Captcha accepted! Continuing authentication...', 'success');
          captchaInput.value = '';
          pollStatus();
        } else {
          showFeedback(data.error || 'Captcha rejected. Please try again.', 'error');
        }
      } catch (err) {
        showFeedback('Network error. Please check your connection.', 'error');
      } finally {
        captchaBtn.disabled = false;
        captchaBtn.textContent = 'Submit Captcha';
      }
    });

    function showFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className = `feedback ${type}`;
    }

    function hideFeedback() {
      feedback.className = 'feedback';
      feedback.style.display = 'none';
    }
  </script>
</body>
</html>
