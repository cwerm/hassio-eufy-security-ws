<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eufy Security - 2FA Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo svg {
      width: 48px;
      height: 48px;
      fill: #1a73e8;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-bar.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-bar.connected {
      background: #d1fae5;
      color: #065f46;
    }

    .status-bar.disconnected {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-bar.idle {
      background: #e0e7ff;
      color: #3730a3;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-bar.pending .status-dot { background: #f59e0b; animation: pulse 1.5s infinite; }
    .status-bar.connected .status-dot { background: #10b981; }
    .status-bar.disconnected .status-dot { background: #ef4444; }
    .status-bar.idle .status-dot { background: #6366f1; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      text-align: center;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    input[type="text"]:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    input[type="text"]::placeholder {
      letter-spacing: 0.3rem;
      color: #d1d5db;
    }

    button {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: #1a73e8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: #1557b0;
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
    }

    .feedback.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
    }

    .feedback.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v5.7c0 4.83-3.4 9.36-7 10.5-3.6-1.14-7-5.67-7-10.5V6.3l7-3.12zM11 7v2h2V7h-2zm0 4v6h2v-6h-2z"/></svg>
    </div>
    <h1>2FA Verification</h1>
    <p class="subtitle">Enter the verification code sent to your email or phone to complete Eufy Security authentication.</p>

    <div id="statusBar" class="status-bar disconnected">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <form id="verifyForm">
      <div class="input-group">
        <label for="codeInput">Verification Code</label>
        <input type="text" id="codeInput" maxlength="6" placeholder="000000" inputmode="numeric" pattern="\d*" autocomplete="one-time-code" autofocus>
      </div>
      <button type="submit" id="submitBtn">Verify Code</button>
    </form>

    <div id="feedback" class="feedback"></div>
  </div>

  <script>
    const form = document.getElementById('verifyForm');
    const input = document.getElementById('codeInput');
    const btn = document.getElementById('submitBtn');
    const feedback = document.getElementById('feedback');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');

    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '').slice(0, 6);
    });

    function updateStatus(data) {
      statusBar.className = 'status-bar';
      if (!data.wsConnected) {
        statusBar.classList.add('disconnected');
        statusText.textContent = 'Disconnected from eufy-security-ws';
      } else if (data.tfaPending) {
        statusBar.classList.add('pending');
        statusText.textContent = 'Verification code required';
      } else {
        statusBar.classList.add('idle');
        statusText.textContent = 'Connected — no code needed';
      }
    }

    async function pollStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        updateStatus(data);
      } catch {
        updateStatus({ wsConnected: false, tfaPending: false });
      }
    }

    pollStatus();
    setInterval(pollStatus, 3000);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = input.value.trim();
      if (!code || code.length < 4) {
        showFeedback('Please enter a valid 4-6 digit code.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying...';
      feedback.className = 'feedback';
      feedback.style.display = 'none';

      try {
        const res = await fetch('/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();

        if (data.success) {
          showFeedback('Verification successful! Authentication complete.', 'success');
          input.value = '';
          pollStatus();
        } else {
          showFeedback(data.error || 'Verification failed. Please try again.', 'error');
        }
      } catch (err) {
        showFeedback('Network error. Please check your connection.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Verify Code';
      }
    });

    function showFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className = `feedback ${type}`;
    }

    input.focus();
  </script>
</body>
</html>
